{{ define "main" }}
  <div class="max-w-3xl mx-auto px-6 py-16">
    <div class="rounded-xl border border-[color:var(--cp-card-border)] bg-[color:var(--cp-card-bg)] px-6 py-10 shadow-sm">
      <h1 class="mt-0 text-3xl font-bold tracking-tight text-gray-900 dark:text-gray-100">Page not found</h1>
      <p class="mt-3 text-base text-gray-700 dark:text-gray-200">The page you’re looking for doesn’t exist (or the link is outdated). You can use the links below to get back on track.</p>

      <div class="mt-6 flex flex-wrap gap-3">
        <a href="{{ "/search/" | relURL }}" class="ui-btn not-prose no-underline cp-brand-btn focus:outline-none font-medium rounded-lg text-sm px-5 py-2.5 inline-flex items-center">Search</a>
        <a href="{{ "/" | relURL }}" class="ui-btn not-prose no-underline cp-brand-btn-outline focus:outline-none font-medium rounded-lg text-sm px-5 py-2.5 inline-flex items-center">Home</a>
      </div>
    </div>
  </div>
{{ end }}
