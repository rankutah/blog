baseURL = "https://www.breakingbarrierstherapy.com/"
languageCode = "en-us"
title = "Breaking Barriers Therapy"
themesDir = "../../themes"
enableRobotsTXT = true

[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "media"
    target = "assets/media"
  [[module.mounts]]
    source = "media"
    target = "static/media"

[outputs]
  home = ["HTML", "RSS", "JSON", "FORMS"]

[outputFormats.FORMS]
  mediaType   = "application/json"
  baseName    = "forms"
  isPlainText = true
  path        = ".well-known"

[params]
  env = "production"
  # Use the live site's stronger blue and a warmer off-white page background.
  primaryColor        = "#008aff"
  logo                = "/media/logo.png"
  lightBackground     = "#fcfbf7"
  darkBackground      = "slate-950"
  cardBackground      = "white"
  cardBackgroundDark  = "slate-900"
  cardBorderLight     = "#e7e1d4"
  cardBorderDark      = "slate-800"

  # Match Novagutter behavior: no dark mode and no theme toggle.
  forceTheme          = "light"
  disableThemeToggle  = true

  author              = "Breaking Barriers Therapy"
  hideMeta            = true

[params.analytics]
  delayMs = 0
  [params.analytics.google]
    id = ""
    enabled = false
  [params.analytics.clarity]
    id = ""
    enabled = false
  [params.analytics.googleAds]
    id = ""
    enabled = false
  [params.analytics.meta]
    id = ""
    enabled = false

[params.turnstile]
  enable  = true
  sitekey = "0x4AAAAAAB8Xlhe4_-six2GL"

[params.header]
  stickyMobile     = true
  stickyDesktop    = true
  showBrandTitle   = true
  title            = "Breaking Barriers"
  titleSize        = "auto"
  logoHeight       = "h-8 sm:h-9"
  logoHeightPx     = 36
  showCTAOnMobile  = false
  showCTAOnDesktop = true
  CTAText          = "FREE CONSULTATION"
  CTAURL           = "/contact"
  theme            = "blend"

[params.forms]
  action         = "https://submit-form.com/DOH188lWF"
  honeypot       = ""
  successMessage = "Thanks! Your message was sent."
  errorMessage   = "Sorry, something went wrong. Please try again."
  redirect       = ""

[params.socialDefaults]
  size = "w-8 h-8"
  gap  = "gap-3"

  [[params.social]]
    name = "facebook"
    url  = "https://www.facebook.com/breakingbarrierstherapyservices/"
    icon = "media/facebook.png"
    alt  = "Facebook"

  [[params.social]]
    name = "instagram"
    url  = "https://www.instagram.com/breakingbarrierstherapy/"
    icon = "media/instagram.png"
    alt  = "Instagram"

[params.schema.organization]
  enabled   = true
  name      = "Breaking Barriers Therapy"
  legalName = "Breaking Barriers Therapy"
  logo      = "/media/logo.png"
  sameAs = [
    "https://www.facebook.com/breakingbarrierstherapyservices/",
    "https://www.instagram.com/breakingbarrierstherapy/"
  ]

[params.schema.localBusiness]
  enabled   = true
  type      = "MedicalBusiness"
  name      = "Breaking Barriers Therapy"
  id        = "#localbusiness"
  url       = "/"
  image     = "/media/logo.png"
  logo      = "/media/logo.png"
  telephone = "+1-801-987-6333"
  sameAs = [
    "https://www.facebook.com/breakingbarrierstherapyservices/",
    "https://www.instagram.com/breakingbarrierstherapy/"
  ]
  areaServed = ["Utah County, UT"]

  [[params.schema.localBusiness.locations]]
    name            = "Breaking Barriers Therapy - Saratoga Springs"
    hasMap          = "https://share.google/35Ezw6E8v5p2I2fJ0"
    streetAddress   = "24 W Sergeant Court Drive, Suite 204"
    addressLocality = "Saratoga Springs"
    addressRegion   = "UT"
    postalCode      = "84045"
    addressCountry  = "US"

  [[params.schema.localBusiness.locations]]
    name            = "Breaking Barriers Therapy - Lehi"
    hasMap          = "https://share.google/7pqDiIXDFuvFuKQ55"
    streetAddress   = "400 Millpond Dr #E"
    addressLocality = "Lehi"
    addressRegion   = "UT"
    postalCode      = "84043"
    addressCountry  = "US"

[params.section.defaults]
  max   = "xl"
  pad   = "none"
  padMobile = "sm"
  y     = "md"
  align = "start"

[menu]
  [[menu.main]]
    name = "About"
    url = "/about"
    weight = 10

  [[menu.main]]
    name = "Services"
    url = "/services"
    identifier = "services"
    weight = 20

  [[menu.main]]
    name = "ABA Therapy"
    url = "/aba-therapy"
    parent = "services"
    weight = 21

  [[menu.main]]
    name = "Occupational Therapy"
    url = "/occupational-therapy"
    parent = "services"
    weight = 22

  [[menu.main]]
    name = "Speech-Language Pathology"
    url = "/speech-language-pathology"
    parent = "services"
    weight = 23

  [[menu.main]]
    name = "Insurance & Grants"
    url = "/insurance"
    weight = 30

  [[menu.main]]
    name = "Special Classes"
    url = "/specialclasses"
    weight = 40

  [[menu.main]]
    name = "Employment"
    url = "/apply"
    weight = 50

  [[menu.main]]
    name = "Donate"
    url = "/donate"
    weight = 60

  [[menu.main]]
    name = "Contact"
    url = "/contact"
    weight = 70

  # trigger to launch rebuild new
