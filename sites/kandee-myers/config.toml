baseURL = "https://kandeemyers.com/"  # TODO: update when deploying
title = "Kandee 4 Utah"
languageCode = "en-us"
themesDir = "../../themes"
# touched: 2026-02-06 (force rebuild)

trailingSlash = "never"
cleanDestinationDir = true
uglyURLs = false

enableRobotsTXT = true

[module]
  [[module.mounts]]
    source = "static"
    target = "static"

  [[module.mounts]]
    source = "media"
    target = "static/media"

  [[module.mounts]]
    source = "media"
    target = "assets/media"

[outputs]
  home = ["HTML", "RSS", "JSON", "FORMS"]

[params]
  # Brand styling (shared theme consumes these)
  # Primary accent = campaign blue; we’ll use Utah-flag red as a secondary accent in page content.
  primaryColor = "blue"

  # Fonts (optional): override body/headings globally.
  # Supported presets: "sans" | "serif"; you can also provide a full font-family stack.
  #
  # Example (serif headings, sans body):
  # [params.fonts]
  #   body = "sans"
  #   heading = "serif"
  #
  # Example (custom fonts + self-hosted Google Fonts):
  # [params.fonts]
  #   load = "family=Playfair+Display:wght@400;700&family=Inter:wght@400;600;700&display=swap"
  #   body = "Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica Neue, Arial, Noto Sans, sans-serif"
  #   heading = "Playfair Display, ui-serif, Georgia, Times New Roman, Times, serif"
  #
  # Then run: SITE=kandee-myers node scripts/vendor-google-fonts.mjs

  # Optional; add a real logo later (this affects Organization schema auto-logo too).
  logo = ""

  # Clean, readable palette that also looks good in dark mode.
  lightBackground     = "#f5f4eb"
  darkBackground      = "slate-950"
  cardBackground      = "#e0ddcf"
  cardBackgroundDark  = "slate-800"
  cardBorderLight     = "#c2bfb3"
  cardBorderDark      = "slate-700"

  clientName = "Kandee Myers"
  clientURL  = "https://kandeemyers.com"

  author = "Kandee Myers"

  # Search is off by default unless you mount a blog.
  enableSearch = false

  [params.motion]
    enabled = true

  [params.schema.organization]
    enabled = true
    name    = "Kandee 4 Utah"

[params.analytics]
  provider = "zaraz"
  # Load analytics immediately (Zaraz itself is injected after LCP by the shared theme)
  delayMs = 0
  clarityOnlyOnInteraction = true
  debugMode = false

  [params.analytics.google]
    id = "SBTCE62ZGX"
    enabled = false

  [params.analytics.clarity]
    id = ""
    enabled = false

  [params.analytics.googleAds]
    id = ""
    enabled = false

  [params.analytics.meta]
    id = ""
    enabled = false

[params.turnstile]
  enable  = true
  sitekey = "0x4AAAAAAB8Xlhe4_-six2GL"

[params.forms]
  # Shared contact form shortcode will use this.
  redirect = "https://kandee4utah.com/thank-you"

[params.header]
  theme             = "blend"
  stickyMobile  = true
  stickyDesktop = true
  showCTAOnMobile  = true
  CTAText       = "Donate"
  CTAURL        = "https://app.proximityimpact.com/payment-donation/link/119/4d6227e0-b480-47cf-93ad-82c85a855a1a?name=Kandee-Myers"
  showPhoneOnMobile = false
  showBrandTitle = true
  flushHero = true
  contentPadTop = "5rem"

[params.messageFab]
  # Floating message button (FAB) label + icon
  text = "Volunteer"
  showIcon = true
  showTextMobile = true
  hideOnContact = false
  url = "https://app.proximityimpact.com/web-volunteer-form/4d6227e0-b480-47cf-93ad-82c85a855a1a"

