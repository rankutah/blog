baseURL       = "https://clearpresence.io/"
# use | to add a second line
title         = "Clear Presence"
languageCode  = "en-us"
themesDir     = "../../themes"
 # noop: 2025-11-25 ensure shared robots.txt in use
# touched: 2026-02-06 (force rebuild)

trailingSlash = "never"
cleanDestinationDir = true
uglyURLs      = false
disableKinds  = ["taxonomy", "term"]

[module]

  # Ensure the site's own content directory is mounted (required when using module mounts)
  [[module.mounts]]
    source = "content"
    target = "content"

  [[module.mounts]]
    source = "static"
    target = "static"

  [[module.mounts]]
    source = "media"
    target = "assets/media"

  [[module.mounts]]
    source = "media"
    target = "static/media"

# Flowbite layout cascade is provided by shared config


[outputs]
  # Inherit defaults; override only if needed
  home         = ["HTML", "RSS", "JSON", "FORMS"]

[params]
  env = "production"
  primaryColor        = "blue"
  logo = "media/logo.png"
  lightBackground  = "slate-200"  # any color @ 50|100|200
  darkBackground   = "slate-950" # neutral @ 800|900|950
  cardBackground     = "slate-100"     # or "slate-100", "rose-50", etc.
  cardBackgroundDark = "slate-800"  # or "slate-800", "black", etc.
  cardBorderLight    = "slate-300"  # no "border-" prefix
  cardBorderDark     = "slate-700"  # no "border-" prefix

  showReadingTime     = true
  enableSearch        = true
  clientName          = "Clear Presence"
  clientURL           = "https://clearpresence.io"
  mainSections        = []
  # defaultTheme/disableThemeToggle centralized in shared config
  author              = "Benjamin Awerkamp"
  hideMeta            = false
  ariaLabelCall       = "Call me"

  [params.motion]
    enabled = true

[params.hero.parallax]
  enabled = true
  ratio = 0.22
  max = 80

[params.messageModal]
  enable = false

[params.messageFab]
  enable = true

[params.faqs]
  headingLevel = 3

[params.schema.organization]
enabled = true
name = "Clear Presence LLC"
legalName = "Clear Presence LLC"
url = "https://clearpresence.io/"
logo = "/media/logo.png"
sameAs = []

[params.socialDefaults]
  size = "w-8 h-8"
  gap  = "gap-3"

  [[params.social]]
    name = "facebook"
    url  = "https://www.facebook.com/people/Clear-Presence/61587216928684/"
    icon = "media/facebook.avif"
    alt  = "Facebook"

  [[params.social]]
    name = "instagram"
    url  = "https://instagram.com/clearpresence"
    icon = "media/instagram.avif"
    alt  = "Instagram"

  [[params.social]]
    name = "linkedin"
    url  = "https://www.linkedin.com/in/benjamin-awerkamp/"
    icon = "media/linkedin.png"
    alt  = "LinkedIn"

[params.analytics]
  [params.analytics.googleTag]
    # Single routed Google tag. Connect this tag to GA4 and Ads in Google.
    id = "AW-17704568736"
    enabled = true
    # Load gtag immediately.
    delayMs = 0
    lcpGate = false
    # Temporary: enable GA4 debug_mode for Tag Assistant / DebugView visibility
    debugMode = false
    analyticsEventPrefix = "key_"

  [params.analytics.googleTag.conversions.callClick]
    enabled = true
    sendTo = ""
    value = 20
    includeInPageAttribution = true

  [params.analytics.googleTag.conversions.textClick]
    enabled = true
    sendTo = ""
    value = 10
    includeInPageAttribution = false

  [params.analytics.googleTag.conversions.pricingPageView]
    enabled = false
    path = "/pricing"
    sendTo = ""
    value = 10
    includeInPageAttribution = false

  [params.analytics.googleTag.conversions.contactPageView]
    enabled = false
    path = "/contact"
    sendTo = ""
    value = 15
    includeInPageAttribution = false

  [params.analytics.googleTag.conversions.thankYouPageView]
    enabled = true
    path = "/thank-you"
    sendTo = ""
    value = 100
    includeInPageAttribution = true

  [params.analytics.googleTag.conversions.welcomePageView]
    enabled = false
    path = "/welcome"
    sendTo = ""
    # Leave `value` unset here. Pass the purchase amount in the redirect URL as:
    #   /welcome?value=299
    # The shared tracker will read that query param and send it as the conversion value.
    # This uses the existing content page at `content/welcome.md`.
    valueQueryParam = "value"
    includeInPageAttribution = false

  [params.analytics.googleTag.conversions.engagedUser]
    enabled = false
    sendTo = ""
    value = 5
    minSessionSeconds = 10
    minPages = 2
    includeInPageAttribution = false

  [params.analytics.clarity]
    id = "u9tbqd2kqk"
    enabled = true
    delayMs = 5000
    onlyOnInteraction = false

  [params.analytics.phoneReplace]
    enabled = true
    # Google Ads website call conversion label used for forwarding-number replacement.
    conversionLabel = "uKziCM6p7tQbEKCPmfpB"

  [params.analytics.meta]
    id = ""               # e.g., 123456789012345 (Meta Pixel)
    enabled = false        # set true when ready

[params.header]
  stickyMobile     = true
  stickyDesktop    = true
  showCTAOnMobile  = false
  showCTAOnDesktop = true
  CTAText          = "Call (385) 323-8130"
  CTAURL           = "tel:+13853238130"
  # CTAClasses       = "text-white bg-rose-600 hover:bg-rose-700 focus:ring-rose-300"
  showPhoneOnMobile = true
  phoneNumber       = "385-323-8130"
  theme = "glass" #blend (default), invert, glass

[params.forms]
  action         = "https://submit-form.com/DOH188lWF"
  honeypot       = ""                   # disabled (Turnstile in place)
  successMessage = "Thanks! Your message was sent."
  errorMessage   = "Sorry, something went wrong. Please try again."
  redirect       = "https://clearpresence.io/thank-you"
  # submitClasses = "..."               # optional button styling

[params.turnstile]
  # Enable Cloudflare Turnstile on forms rendered via the contact-form shortcode
  enable  = true
  # Reuse Blue Ridge Abbey site key (make sure site domains are allowed in CF)
  sitekey = "0x4AAAAAAB8Xlhe4_-six2GL"

[params.section.defaults]
  # Container width (sitewide content width):
  #   sm → max-w-screen-sm
  #   md → max-w-3xl
  #   lg → max-w-5xl
  #   xl → max-w-7xl
  #   2xl → max-w-screen-2xl
  #   full → max-w-none (edge to edge)
  max   = "xl"

  # Horizontal padding (sitewide gutters):
  #   none → px-0, sm → px-4, md → px-6, lg → px-8
  # Tip: keep a gutter even on full-width for mobile readability.
  pad   = "lg"

  # Note: Vertical page-edge padding and per-section alignment were removed.
  # Spacing inside content uses default typography; no extra sitewide controls.


